services:
  db:
    image: postgres:16-alpine
    container_name: formsecure-db
    environment:
      POSTGRES_USER: formsecure
      POSTGRES_PASSWORD: formsecure
      POSTGRES_DB: formsecure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formsecure -d formsecure"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
